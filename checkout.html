<!DOCTYPE html>
<html>
<head>
  <title>Checkout - Hostel Kart</title>
  <link rel="stylesheet" href="style.css">

  <style>
    .checkout-box{
      max-width:600px;
      margin:40px auto;
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
    }

    input{
      width:100%;
      padding:12px;
      margin:10px 0;
      border-radius:8px;
      border:1px solid #ccc;
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:30px;
      background:#e74c3c;
      color:white;
      font-size:1.1rem;
      cursor:pointer;
      margin-top:20px;
    }
  </style>
</head>

<body>

<header class="header">
  <div class="logo">Hostel Kart</div>
</header>

<div class="checkout-box">

  <h2>Delivery Details</h2>

  <!-- ✅ FIXED IDs -->
  <input type="text" id="name" placeholder="Full Name">
  <input type="text" id="phone" placeholder="Phone Number">
  <input type="text" id="hostel name" placeholder="hostel name">
  <input type="text" id="room no" placeholder="room no">

  <!-- ✅ FIXED BUTTON -->
  <button onclick="goToPayment()">Continue to Payment</button>

</div>

<script>

function goToPayment(){

  let name = document.getElementById("name").value.trim();
  let phone = document.getElementById("phone").value.trim();
  let address = document.getElementById("hostel name").value.trim();
  let room  = document.getElementById("room no").value.trim();
  

  if(name === "" || phone === "" || address === ""){
    alert("Please fill all details");
    return;
  }

  // save user data
  localStorage.setItem("userDetails", JSON.stringify({
    name,
    phone,
    address
  }));

  console.log("✅ Going to payment page");

  // 🔥 REDIRECT FIX
  window.location.href = "payment.html";
}

</script>

</body>
</html>
