<!DOCTYPE html>
<html lang="en">
<head>
  <title>Cart - Hostel Kart</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body{
      background: linear-gradient(135deg,#eef2ff,#f7f9ff);
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 30px;
      background:rgba(255,255,255,0.7);
      backdrop-filter: blur(12px);
      box-shadow:0 8px 25px rgba(0,0,0,0.05);
      position:sticky;
      top:0;
      z-index:10;
    }

    .logo{
      font-size:1.4rem;
      font-weight:700;
      color:#4f46e5;
      letter-spacing:0.5px;
    }

    .menu a{
      text-decoration:none;
      color:#333;
      font-weight:500;
    }

    .cart-wrapper{
      max-width:1150px;
      margin:25px auto;
      display:grid;
      grid-template-columns:2fr 1fr;
      gap:25px;
      padding:10px;
    }

    .cart-left{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .cart-item{
      display:flex;
      gap:15px;
      padding:15px;
      background:rgba(255,255,255,0.9);
      border-radius:18px;
      box-shadow:0 10px 25px rgba(0,0,0,0.06);
      transition:0.25s ease;
      border:1px solid rgba(0,0,0,0.03);
    }

    .cart-item:hover{
      transform:translateY(-4px);
      box-shadow:0 15px 35px rgba(0,0,0,0.1);
    }

    .cart-item img{
      width:95px;
      height:95px;
      border-radius:14px;
      object-fit:cover;
    }

    .item-name{
      font-size:1.1rem;
      font-weight:600;
      color:#1f2937;
    }

    .item-price{
      margin-top:5px;
      font-weight:600;
      color:#4f46e5;
    }

    .qty-box{
      display:flex;
      align-items:center;
      gap:10px;
      margin-top:10px;
    }

    .qty-btn{
      width:34px;
      height:34px;
      border:none;
      border-radius:10px;
      background:#4f46e5;
      color:white;
      font-size:18px;
      cursor:pointer;
      transition:0.2s;
    }

    .qty-btn:hover{
      background:#3730a3;
    }

    .remove-btn{
      margin-top:8px;
      background:none;
      border:none;
      color:#ef4444;
      font-weight:500;
      cursor:pointer;
    }

    .cart-right{
      position:sticky;
      top:90px;
      background:rgba(255,255,255,0.9);
      backdrop-filter: blur(10px);
      padding:22px;
      border-radius:20px;
      box-shadow:0 12px 30px rgba(0,0,0,0.08);
      border:1px solid rgba(0,0,0,0.05);
    }

    .summary-title{
      font-size:1.3rem;
      font-weight:700;
      margin-bottom:18px;
      color:#111827;
    }

    .summary-row{
      display:flex;
      justify-content:space-between;
      margin:12px 0;
      color:#4b5563;
      font-size:0.95rem;
    }

    .total{
      font-size:1.4rem;
      font-weight:800;
      color:#4f46e5;
    }

    /* ✅ NEW BUTTON STYLE */
    .checkout-btn{
      width:100%;
      padding:14px;
      border:none;
      border-radius:16px;
      background: linear-gradient(135deg,#6366f1,#8b5cf6);
      color:white;
      font-size:1rem;
      font-weight:600;
      cursor:pointer;
      margin-top:18px;

      box-shadow:0 10px 25px rgba(99,102,241,0.35);
      transition:0.3s ease;
      position:relative;
      overflow:hidden;
    }

    .checkout-btn::before{
      content:"";
      position:absolute;
      top:0;
      left:-100%;
      width:100%;
      height:100%;
      background:rgba(255,255,255,0.25);
      transform:skewX(-20deg);
      transition:0.5s;
    }

    .checkout-btn:hover::before{
      left:120%;
    }

    .checkout-btn:hover{
      transform:translateY(-3px);
      box-shadow:0 15px 35px rgba(99,102,241,0.5);
    }

    .empty{
      text-align:center;
      padding:70px;
      color:#6b7280;
      font-size:1.1rem;
    }

    @media(max-width:768px){
      .cart-wrapper{
        grid-template-columns:1fr;
      }
      .cart-right{
        position:static;
      }
    }
  </style>
</head>

<body>

<header class="header">
  <div class="logo">Hostel Kart</div>
  <div class="menu">
    <a href="index.html">Home</a>
  </div>
</header>

<div class="cart-wrapper">

  <div class="cart-left" id="cart-items"></div>

  <div class="cart-right">
    <div class="summary-title">Order Summary</div>

    <div class="summary-row">
      <span>Items</span>
      <span id="item-count">0</span>
    </div>

    <div class="summary-row total">
      <span>Total</span>
      <span id="total-price">₹0</span>
    </div>

    <button class="checkout-btn" onclick="goToCheckout()">
      Proceed to Checkout
    </button>
  </div>

</div>

<script>
function loadCart(){

  let cart = JSON.parse(localStorage.getItem("hostelKartCart")) || [];
  const container = document.getElementById("cart-items");

  container.innerHTML = "";

  if(cart.length === 0){
    container.innerHTML = `<div class="empty">🛒 Your cart is empty</div>`;
    document.getElementById("total-price").textContent = "₹0";
    document.getElementById("item-count").textContent = "0";
    return;
  }

  let total = 0;
  let count = 0;

  cart.forEach((item,index)=>{

    total += item.price * item.quantity;
    count += item.quantity;

    container.innerHTML += `
      <div class="cart-item">

        <img src="${item.image || 'https://via.placeholder.com/100'}">

        <div>
          <div class="item-name">${item.name}</div>
          <div class="item-price">₹${item.price}</div>

          <div class="qty-box">
            <button class="qty-btn" onclick="changeQty(${index}, -1)">−</button>
            <span>${item.quantity}</span>
            <button class="qty-btn" onclick="changeQty(${index}, 1)">+</button>
          </div>

          <button class="remove-btn" onclick="removeItem(${index})">
            Remove
          </button>
        </div>

      </div>
    `;
  });

  document.getElementById("total-price").textContent = "₹" + total;
  document.getElementById("item-count").textContent = count;
}

function changeQty(index, change){
  let cart = JSON.parse(localStorage.getItem("hostelKartCart")) || [];

  cart[index].quantity += change;

  if(cart[index].quantity <= 0){
    cart.splice(index,1);
  }

  localStorage.setItem("hostelKartCart", JSON.stringify(cart));
  loadCart();
}

function removeItem(index){
  let cart = JSON.parse(localStorage.getItem("hostelKartCart")) || [];

  cart.splice(index,1);

  localStorage.setItem("hostelKartCart", JSON.stringify(cart));
  loadCart();
}

function goToCheckout(){
  let cart = JSON.parse(localStorage.getItem("hostelKartCart")) || [];

  if(cart.length === 0){
    alert("Cart is empty!");
    return;
  }

  window.location.href = "checkout.html";
}

loadCart();
</script>

</body>
</html>
