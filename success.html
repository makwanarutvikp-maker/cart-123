<!DOCTYPE html>
<html lang="en">
<head>
  <title>Order Successful - Hostel Kart</title>
  <link rel="stylesheet" href="style.css">

  <style>
    body{
      background:#f5f6fa;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      margin:0;
      font-family:sans-serif;
    }

    .success-box{
      background:white;
      padding:40px;
      border-radius:20px;
      text-align:center;
      box-shadow:0 20px 50px rgba(0,0,0,0.1);
      max-width:400px;
      width:90%;
    }

    .checkmark{
      font-size:60px;
      color:#4CAF50;
      margin-bottom:20px;
    }

    h1{
      margin-bottom:10px;
      color:#2c3e50;
    }

    p{
      color:#777;
      margin-bottom:20px;
    }

    .order-id{
      background:#f1f2f6;
      padding:10px;
      border-radius:10px;
      margin-bottom:20px;
      font-weight:bold;
    }

    .btn{
      display:block;
      width:100%;
      padding:12px;
      border:none;
      border-radius:30px;
      background:#e74c3c;
      color:white;
      font-size:1rem;
      cursor:pointer;
      text-decoration:none;
    }

    .btn:hover{
      background:#c0392b;
    }
  </style>
</head>

<body>

<div class="success-box">

  <div class="checkmark">✅</div>

  <h1>Order Placed!</h1>

  <p>Your order has been placed successfully 🎉</p>

  <div class="order-id" id="order-id"></div>

  <a href="index.html" class="btn">Continue Shopping</a>

</div>

<script>

// GENERATE RANDOM ORDER ID
const orderId = "HK" + Math.floor(Math.random() * 1000000);

// SHOW ORDER ID
document.getElementById("order-id").textContent = "Order ID: " + orderId;


// CLEAR CART AFTER SUCCESS
localStorage.removeItem("hostelKartCart");

</script>

</body>
</html>
